# 本地开发用 —— 启动基础设施和独立业务系统，前后端可在本机跑
# 用法: docker compose -f docker-compose.dev.yml up -d
services:
  bou-business:
    build:
      context: ./bou-business
      dockerfile: Dockerfile
    container_name: bou_business
    environment:
      BOU_BUSINESS_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:8011:8011"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: ai_customer_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: ai_customer_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:

services:
  # ── 前端 + Nginx 反向代理 ────────────────────────────────────────────────────
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── 后端 API ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      # 覆盖 .env 里的 localhost 地址，指向 Docker 内部服务名
      QDRANT_URL: http://qdrant:6333
      MONGODB_URL: mongodb://mongodb:27017
      MCP_SERVER_URL: http://bou-business:8011/mcp
      CORS_ORIGINS: "*"
    depends_on:
      - bou-business
      - qdrant
      - mongodb
    restart: unless-stopped

  # ── 独立业务系统：REST API + MCP Server ─────────────────────────────────────
  bou-business:
    build:
      context: ./bou-business
      dockerfile: Dockerfile
    environment:
      BOU_BUSINESS_HOST: 0.0.0.0
    restart: unless-stopped

  # ── 向量数据库 ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: ai_customer_qdrant
    ports:
      - "127.0.0.1:6333:6333"  # 只允许本机访问，供 ingest 脚本使用
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── 对话历史存储 ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ai_customer_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:

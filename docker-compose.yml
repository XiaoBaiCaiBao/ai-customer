services:
  # ── 前端 + Nginx 反向代理 ────────────────────────────────────────────────────
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── 后端 API ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      # 覆盖 .env 里的 localhost 地址，指向 Docker 内部服务名
      QDRANT_URL: http://qdrant:6333
      MONGODB_URL: mongodb://mongodb:27017
      CORS_ORIGINS: "*"
      USE_MEMORY: "false"
    depends_on:
      - qdrant
      - mongodb
    restart: unless-stopped

  # ── 向量数据库 ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: ai_customer_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── 对话历史存储 ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ai_customer_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:

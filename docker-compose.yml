services:
  qdrant:
    image: qdrant/qdrant:v1.13.1
    container_name: ai_customer_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: ai_customer_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:
